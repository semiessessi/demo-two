<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SA-43 — Ship Preview</title>
    <style>
      html, body { margin: 0; height: 100%; background: #05060a; overflow: hidden; }
      #app { position: fixed; inset: 0; }
      #hint {
        position: fixed; left: 12px; bottom: 10px; z-index: 10;
        font: 12px/1.4 ui-monospace, monospace; color: #6f7a86; pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
      #loading {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        font: 14px ui-monospace, monospace; color: #9fb4c8; z-index: 5;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loading">loading model…</div>
    <div id="hint">drag = orbit · scroll = zoom · right-drag = pan · controls top-right</div>
    <script type="module" src="/src/shipPreview.js"></script>
  </body>
</html>
