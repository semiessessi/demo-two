name = "demo-two"
compatibility_date = "2026-06-01"
workers_dev = true

# Static-assets-only Worker: serves the Vite build output (dist/).
[assets]
directory = "./dist"

# Attach the custom domain. Cloudflare creates the DNS record + TLS cert on
# first `wrangler deploy`. Requires the redmarmosetstudios.com zone to live on
# the same Cloudflare account as the deploy token.
[[routes]]
pattern = "d2.redmarmosetstudios.com"
custom_domain = true
